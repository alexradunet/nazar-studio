# .github/workflows/pages.yml
# Deploy web/ to GitHub Pages (nazar.studio) on every push to main.
# Add this file via GitHub UI: repo → Add file → .github/workflows/pages.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web          # serves web/ as the Pages root
      - id: deployment
        uses: actions/deploy-pages@v4
